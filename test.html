<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Community Layers Test</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-hexbin@0.2/build/d3-hexbin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="map_community_mapbox.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3JpeWF0aG90YWt1cmEiLCJhIjoiY21kYzhuMG1hMTVrbjJpcHpnZ3Awdjc1dCJ9.bEGwdPmOH5kVaT9RWduC5Q';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11',
        center: [-73.88, 40.835],
        zoom: 13.7,
        pitch: 60,
        bearing: -30,
        antialias: true
    });

    map.on('load', () => {
        console.log('Map loaded');
        
        // Test basic layer addition
        map.addSource('test-source', {
            type: 'geojson',
            data: {
                type: 'FeatureCollection',
                features: [{
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [-73.88, 40.835] },
                    properties: { name: 'Test Point' }
                }]
            }
        });

        map.addLayer({
            id: 'test-layer',
            type: 'circle',
            source: 'test-source',
            paint: {
                'circle-radius': 10,
                'circle-color': '#ff0000'
            }
        });

        console.log('Test layer added');

        // Now try community layers
        setTimeout(() => {
            console.log('Checking if initCommunityLayers exists:', typeof initCommunityLayers);
            if (typeof initCommunityLayers === 'function') {
                console.log('Calling initCommunityLayers...');
                initCommunityLayers(map, {
                    nodesPath: 'south-bronx-map/data/community_nodes.geojson',
                    s311Path: 'south-bronx-map/data/complaints_311.geojson',
                    floodPath: 'south-bronx-map/data/floodnet_sensors.geojson'
                });
            } else {
                console.error('initCommunityLayers not found');
            }
        }, 2000);
    });
</script>

</body>
</html>
